<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 單字解析艙</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-shell">
    
  </div>

  <script src="app.js?v=999"></script>
<div id="side-drawer" style="position: fixed; top: 0; left: -450px; width: 400px; height: 100%; background: rgba(20, 20, 35, 0.95); backdrop-filter: blur(15px); box-shadow: 5px 0 25px rgba(0,0,0,0.5); z-index: 1000; transition: left 0.4s ease; overflow-y: auto; color: white; border-right: 2px solid #E040FB;">
    
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
      <div style="display: flex; gap: 10px;">
        <button id="tab-vocab-btn" style="padding: 8px 12px; background: #E040FB; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">📂 單字書架</button>
        <button id="tab-calendar-btn" style="padding: 8px 12px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">📅 複習行事曆</button>
      </div>
      <button id="close-drawer-btn" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">❌</button>
    </div>

    <div id="drawer-vocab-content" style="padding: 20px;">
      <h2>📂 自訂單字/片語書架</h2>
      <div class="create-folder-box" style="margin-bottom: 25px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
          <h3 style="margin-top:0;">🛠️ 建立新資料夾</h3>
          <input type="text" id="new-folder-input" placeholder="輸入資料夾名稱（如：空中英語）..." style="padding: 10px; border-radius: 8px; border: none; width: 80%; color: #333; margin-bottom: 10px;">
          <button id="create-folder-btn" style="padding: 10px 15px; border-radius: 8px; border: none; background: #E040FB; color: white; cursor: pointer; font-weight: bold; width: 100%;">➕ 建立資料夾</button>
      </div>

      <div id="search-result-container" style="background: rgba(255,255,255,0.15); padding: 15px; border-radius: 10px; margin-bottom: 25px; display: none;">
          <h3 id="result-word-b" style="margin-top: 0; color: #00E5FF;"></h3>
          <div style="margin-top: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px;">
              <label>📁 儲存至資料夾：</label>
              <select id="folder-select" style="padding: 5px; border-radius: 5px; color: #333; width: 100%; margin-top: 5px; margin-bottom: 10px;"></select>
              <button id="save-vocab-btn" style="padding: 6px 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">📥 確認儲存</button>
          </div>
      </div>

      <h3>📚 我的精裝資料夾書架</h3>
      <div id="bookshelf" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;"></div>

      <div id="review-card-container" style="background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 12px; display: none;">
          <h4 id="current-folder-title" style="color: #E040FB; margin-top: 0; text-align: center;"></h4>
          <div id="vocab-card" style="background: #1e1e2f; color: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); margin: 0 auto 20px auto;">
              <h2 id="card-word" style="margin: 0; color: #00E5FF; font-size: 28px; letter-spacing: 1px;">Word</h2>
              
              <div id="card-back" style="display: none; margin-top: 15px; text-align: left; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px;">
                  <p style="margin: 8px 0; font-size: 15px; line-height: 1.5;"><strong style="color: #E040FB;">📝 中文翻譯：</strong> <span id="card-translation" style="color: #ffffff; font-weight: bold;"></span></p>
                  <p style="margin: 8px 0; font-size: 15px; line-height: 1.5;"><strong style="color: #E040FB;">💡 用法說明：</strong> <span id="card-usage" style="color: #e0e0e0;"></span></p>
                  <p style="margin: 8px 0; font-size: 15px; line-height: 1.5;"><strong style="color: #E040FB;">📖 實用例句：</strong> <span id="card-example" style="color: #b3b3b3; font-style: italic;"></span></p>
              </div>
              <small style="color: #888899; display: block; margin-top: 15px; font-size: 12px;">💡 點擊字卡可翻面觀看中文、用法與例句</small>
          </div>
          <div style="text-align: center; margin-top: 15px; margin-bottom: 15px;">
              <button id="prev-card" style="padding: 8px 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; border-radius: 5px; cursor: pointer;">⬅️ 上一個</button>
              <button id="next-card" style="padding: 8px 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; border-radius: 5px; cursor: pointer; margin-left: 10px;">下一個 ➡️</button>
          </div>
          <div id="reclassify-zone" style="text-align: center; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px;">
              <label>🔄 分類至：</label>
              <select id="move-folder-select" style="padding: 4px; border-radius: 4px; color: #333;"></select>
              <button id="move-vocab-btn" style="padding: 4px 10px; background: #00E5FF; color: #111; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">搬家</button>
          </div>
      </div>
    </div>

    <div id="drawer-calendar-content" style="padding: 20px; display: none;">
      <h2>📅 複習行事曆</h2>
      <p style="color: #bbb; font-size: 14px;">在日曆下記錄妳的每日讀書計畫或背單字任務！</p>
      
      <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <button id="prev-month-btn" style="background:none; border:none; color:white; cursor:pointer;">◀</button>
          <h4 id="calendar-month-title" style="margin:0; color:#00E5FF;">2026年 6月</h4>
          <button id="next-month-btn" style="background:none; border:none; color:white; cursor:pointer;">▶</button>
        </div>
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: #E040FB; margin-bottom: 5px; font-size: 12px;">
          <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div id="calendar-days-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center;"></div>
      </div>

      <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px;">
        <h3 id="selected-date-title" style="margin-top:0; color:#00E5FF; font-size:16px;">📅 請選擇日期</h3>
        <div class="input-row" style="display:flex; gap:5px; margin-bottom:10px;">
          <input type="text" id="event-input" placeholder="新增背書任務（如：複習L1單字）..." style="padding: 8px; border-radius: 5px; border: none; flex: 1; color: #333; font-size: 13px;">
          <button id="add-event-btn" style="padding: 8px 12px; background:#00E5FF; color:#111; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">新增</button>
        </div>
        <ul id="event-list" style="padding-left: 20px; color: #eee; font-size: 14px;"></ul>
      </div>
    </div>

  </div>

  <script src="app.js?v=7777"></script>
</body>
</body>
</html>
