<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 單字解析艙 & 行事曆</title>
  <link rel="stylesheet" href="style.css" />
  
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>

  <style>
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    ::-webkit-scrollbar-thumb { background: #E040FB; border-radius: 4px; }
    
    /* 專業行事曆的基礎配色覆蓋 */
    .fc { color: white; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; }
    .fc-theme-standard td, .fc-theme-standard th { border-color: rgba(255,255,255,0.1); }
    .fc-button-primary { background-color: #E040FB !important; border-color: #E040FB !important; }
    .fc-button-primary:hover { background-color: #b02ae6 !important; }
    .fc-event { cursor: pointer; border-radius: 4px; border: none; padding: 2px 4px; font-size: 13px; }
    
    /* 右下角懸浮按鈕 (FAB) */
    #fab-add-event {
      position: fixed; bottom: 30px; right: 30px;
      width: 60px; height: 60px; border-radius: 50%;
      background: #00E5FF; color: #111;
      font-size: 32px; font-weight: bold; border: none;
      box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
      cursor: pointer; z-index: 100; transition: transform 0.2s;
    }
    #fab-add-event:hover { transform: scale(1.1); }
    
    /* 彈出表單背景 */
    #event-modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
      z-index: 200; display: none; justify-content: center; align-items: center;
    }
    /* 彈出表單內容 */
    #event-modal {
      background: #1e1e2f; padding: 25px; border-radius: 12px;
      width: 90%; max-width: 400px; border: 1px solid #E040FB;
      color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    #event-modal input, #event-modal select {
      width: 100%; padding: 10px; margin-bottom: 15px;
      border-radius: 6px; border: none; box-sizing: border-box;
      background: rgba(255,255,255,0.9); color: #333;
    }
    /* =========================================
       修復 FullCalendar 年曆視圖 (Year View) 在深色模式下的反白問題
       ========================================= */
    .fc .fc-multimonth-daygrid { background: #12121c !important; }
    .fc-theme-standard .fc-scrollgrid { border-color: rgba(255,255,255,0.1) !important; }
    .fc-daygrid-day { border-color: rgba(255,255,255,0.05) !important; }
    .fc .fc-multimonth-title { color: #00E5FF !important; font-weight: bold; padding: 10px 0; }
    .fc .fc-multimonth-daygrid-table, .fc .fc-multimonth-header-table { background: rgba(255,255,255,0.02) !important; color: white; }
    /* 讓年曆上的點點更圓潤明顯 */
    .fc-daygrid-dot-event { padding: 2px; border-radius: 4px; }
    .fc .fc-daygrid-body-unbalanced .fc-daygrid-day-events { min-height: 1.5em; }
    /* 隱藏年曆視圖上的時間數字 (例如 12a, 2p) */
    .fc .fc-multimonth-daygrid .fc-event-time { display: none !important; }
    /* 隱藏年曆視圖上的文字標題，只留下顏色點點 */
    .fc .fc-multimonth-daygrid .fc-event-title { display: none !important; }
  </style>
  
</head>
<body style="background: #12121c; color: white; font-family: sans-serif; margin: 0; padding: 0;">

  <div id="login-section" style="text-align: center; margin-top: 150px;">
    <h1 style="color: #00E5FF; font-size: 32px;">🚀 歡迎來到 AI 學習規劃艙</h1>
    <p style="color: #bbb; margin-bottom: 30px;">請先登入以使用專屬行事曆與單字書架</p>
    <button id="google-login" style="padding: 12px 24px; font-size: 16px; background: white; color: #333; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(255,255,255,0.2);">
      🔑 使用 Google 帳號登入
    </button>
  </div>

  <div id="app-section" class="hidden" style="max-width: 1000px; margin: 0 auto; padding: 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
      <button id="menu-toggle-btn" style="padding: 10px 18px; background: #E040FB; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        ☰ 開啟單字側邊欄
      </button>
      <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 14px; color: #ddd;">👤 <span id="user-display" style="color: #00E5FF; font-weight: bold;">載入中...</span></span>
        <button id="sign-out" style="padding: 6px 12px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 5px; cursor: pointer;">登出</button>
      </div>
    </div>

    <div id="calendar-container"></div>

    <button id="fab-add-event">+</button>

  </div>

  <div id="event-modal-overlay">
    <div id="event-modal">
      <h3 style="margin-top: 0; color: #00E5FF;">📝 新增行程</h3>
      
      <label style="font-size: 13px; color: #bbb;">行程名稱</label>
      <input type="text" id="modal-title" placeholder="如：複習 L1 單字">
      
      <label style="font-size: 13px; color: #bbb;">開始時間</label>
      <input type="datetime-local" id="modal-start">
      
      <label style="font-size: 13px; color: #bbb;">結束時間</label>
      <input type="datetime-local" id="modal-end">
      
      <label style="font-size: 13px; color: #bbb;">行程分類 (顏色標記)</label>
      <select id="modal-color">
        <option value="#FF5252">🔴 紅色 (緊急 / 重大事件)</option>
        <option value="#FF3D00">🔥 橘紅 (考試 / 測驗)</option>
        <option value="#FFC107">🟡 黃色 (重要 / 待辦作業)</option>
        <option value="#4CAF50">🟢 綠色 (學校活動 / 社團)</option>
        <option value="#00E5FF">🔵 藍色 (個人行程 / 休閒)</option>
        <option value="#FF9800">🟠 橘色 (補習 / 進修)</option>
        <option value="#9C27B0">🟤 棕色 (瑣事 / 雜項)</option>
        <option value="#E91E63">🩷 粉紅 (特殊紀念日)</option>
        <option value="#E040FB">🟣 紫色 (預設一般行程)</option>
      </select>

      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button id="modal-cancel-btn" style="flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; background: rgba(255,255,255,0.2); color: white;">取消</button>
        <button id="modal-save-btn" style="flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; background: #00E5FF; color: #111; font-weight: bold;">💾 儲存</button>
      </div>
    </div>
  </div>

  <div id="side-drawer" style="position: fixed; top: 0; left: -500px; width: 450px; height: 100%; background: rgba(20, 20, 35, 0.98); backdrop-filter: blur(15px); box-shadow: 5px 0 25px rgba(0,0,0,0.8); z-index: 1000; transition: left 0.4s ease; overflow-y: auto; color: white; border-right: 2px solid #E040FB;">
    
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; background: rgba(20, 20, 35, 0.98); z-index: 10;">
      <h3 style="margin: 0; color: white;">📚 單字管理庫</h3>
      <button id="close-drawer-btn" style="background: none; border: none; color: #bbb; font-size: 20px; cursor: pointer;">❌ 關閉</button>
    </div>

    <div style="padding: 20px;">
      <h3 style="color: #00E5FF; margin-top: 0;">🔍 搜尋新單字</h3>
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="word-input" placeholder="輸入英文..." style="padding: 10px; width: 100%; border-radius: 8px; border: none; font-size: 14px; outline: none; color: #333;">
        <button id="search-button" style="padding: 10px 15px; background: #00E5FF; color: #111; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex-shrink: 0;">解析</button>
      </div>

      <div id="result-card" class="hidden" style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; border: 1px solid rgba(0, 229, 255, 0.3); margin-bottom: 25px;">
        <h2 id="result-word" style="color: #00E5FF; margin-top: 0;">Word</h2>
        <div style="margin-bottom: 10px; color: #bbb; font-size: 13px;">
          <div>🗣️ 音標：<span id="result-phonetic" style="color: white;"></span></div>
          <div style="margin-top: 5px;">🧩 字根：<span id="result-root" style="color: white;"></span></div>
        </div>
        <h4 style="color: #E040FB; margin-bottom: 5px;">📝 定義</h4>
        <ul id="result-definition" style="margin-top: 0; padding-left: 15px; line-height: 1.6; color: #eee; font-size: 14px;"></ul>
        <h4 style="color: #E040FB; margin-bottom: 5px; margin-top: 15px;">💡 例句</h4>
        <ul id="result-example" style="margin-top: 0; padding-left: 15px; line-height: 1.6; font-style: italic; color: #ccc; font-size: 14px;"></ul>
      </div>

      <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">
      
      <h2>📂 自訂單字書架</h2>
      <div class="create-folder-box" style="margin-bottom: 25px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
          <h4 style="margin-top:0; color: #00E5FF;">🛠️ 建立新資料夾</h4>
          <input type="text" id="new-folder-input" placeholder="資料夾名稱..." style="padding: 10px; border-radius: 8px; border: none; width: 85%; color: #333; margin-bottom: 10px;">
          <button id="create-folder-btn" style="padding: 10px 15px; border-radius: 8px; border: none; background: #E040FB; color: white; cursor: pointer; font-weight: bold; width: 100%;">➕ 建立</button>
      </div>

      <div id="search-result-container" style="background: rgba(255,255,255,0.15); padding: 15px; border-radius: 10px; margin-bottom: 25px; display: none;">
          <h3 id="result-word-b" style="margin-top: 0; color: #00E5FF;"></h3>
          <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px;">
              <label>📁 儲存至資料夾：</label>
              <select id="folder-select" style="padding: 5px; border-radius: 5px; color: #333; width: 100%; margin-top: 5px; margin-bottom: 10px;"></select>
              <button id="save-vocab-btn" style="padding: 6px 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">📥 確認儲存</button>
          </div>
      </div>

      <h3>📚 我的書架</h3>
      <div id="bookshelf" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px;"></div>

      <div id="review-card-container" style="background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 12px; display: none; border: 1px solid rgba(224, 64, 251, 0.4);">
          <h4 id="current-folder-title" style="color: #E040FB; margin-top: 0; text-align: center;"></h4>
          <div id="vocab-card" style="background: #1e1e2f; color: white; padding: 25px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); margin: 0 auto 20px auto;">
              <h2 id="card-word" style="margin: 0; color: #00E5FF; font-size: 28px;">Word</h2>
              <div id="card-back" style="display: none; margin-top: 15px; text-align: left; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px;">
                  <p><strong style="color: #E040FB;">📝 翻譯：</strong> <span id="card-translation"></span></p>
                  <p><strong style="color: #E040FB;">💡 用法：</strong> <span id="card-usage"></span></p>
                  <p><strong style="color: #E040FB;">📖 例句：</strong> <span id="card-example"></span></p>
              </div>
          </div>
          <div style="text-align: center; margin-top: 15px;">
              <button id="prev-card" style="padding: 8px 15px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 5px; cursor: pointer;">⬅️ 上一個</button>
              <button id="next-card" style="padding: 8px 15px; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">下一個 ➡️</button>
          </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
