<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 單字解析艙</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-shell">
    <section id="login-section" class="glass-panel center-panel">
      <div class="section-content">
        <h1>專注實驗室</h1>
        <p>通勤時間，不看社群，看我。</p>
        <button id="google-login" class="button primary-button">使用 Google 帳號登入</button>
      </div>
    </section>

    <section id="app-section" class="hidden">
      <header class="glass-panel top-nav">
        <div>
          <p class="nav-label">歡迎回來，<span id="user-display">讀者</span></p>
          <p class="nav-subtitle">你的 AI 單字解析艙已待命。</p>
        </div>
        <button id="sign-out" class="button secondary-button">登出</button>
      </header>

      <main class="glass-panel content-panel">
        <div class="search-box">
          <label for="word-input">查詢英文單字</label>
          <div class="input-row">
            <input id="word-input" type="text" placeholder="輸入單字，例如 commit" autocomplete="off" />
            <button id="search-button" class="button primary-button">搜尋</button>
          </div>
        </div>

        <section id="result-card" class="glass-panel result-card hidden">
          <div class="result-heading">
            <h2 id="result-word">單字</h2>
            <span id="result-phonetic" class="phonetic">/音標/</span>
          </div>
          <div class="result-block">
            <h3>字根拆解</h3>
            <p id="result-root">com- + mit</p>
          </div>
          <div class="result-block">
            <h3>定義</h3>
            <ul id="result-definition"></ul>
          </div>
          <div class="result-block">
            <h3>例句</h3>
            <ul id="result-example"></ul>
          </div>
        </section>
      </main>
      <section id="vocab-section" class="glass-panel" style="padding: 20px; margin-top: 20px; color: white;">
        <h2>📂 ExamGuardian 多功能自訂單字/片語書架</h2>
        
        <div class="create-folder-box" style="margin-bottom: 25px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
            <h3 style="margin-top:0;">🛠️ 建立新資料夾</h3>
            <input type="text" id="new-folder-input" placeholder="輸入資料夾名稱（如：空中英語）..." style="padding: 10px; border-radius: 8px; border: none; width: 60%; color: #333;">
            <button id="create-folder-btn" style="padding: 10px 15px; border-radius: 8px; border: none; background: #E040FB; color: white; cursor: pointer; font-weight: bold;">➕ 建立資料夾</button>
        </div>

        <div id="search-result-container" style="background: rgba(255,255,255,0.15); padding: 15px; border-radius: 10px; margin-bottom: 25px; display: none;">
            <h3 id="result-word-b" style="margin-top: 0; color: #00E5FF;"></h3>
            <div style="margin-top: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px;">
                <label>📁 儲存至資料夾：</label>
                <select id="folder-select" style="padding: 5px; border-radius: 5px; color: #333;">
                    </select>
                <button id="save-vocab-btn" style="padding: 6px 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px; font-weight: bold;">📥 確認儲存</button>
            </div>
        </div>

        <h3>📚 我的精裝資料夾書架</h3>
        <div id="bookshelf" style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;">
            </div>

        <div id="review-card-container" style="background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 12px; display: none;">
            <h4 id="current-folder-title" style="color: #E040FB; margin-top: 0; text-align: center;"></h4>
            
            <div id="vocab-card" style="background: rgba(255,255,255,0.95); color: #333; padding: 25px; border-radius: 10px; max-width: 400px; margin: 0 auto 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; cursor: pointer;">
                <h2 id="card-word" style="margin: 0; color: #1a237e;">Word</h2>
                <div id="card-back" style="display: none; margin-top: 15px; text-align: left; border-top: 1px solid #ccc; padding-top: 10px;">
                    <p><strong>📝 中文翻譯：</strong> <span id="card-translation"></span></p>
                    <p><strong>💡 用法說明：</strong> <span id="card-usage"></span></p>
                    <p><strong>📖 實用例句：</strong> <span id="card-example"></span></p>
                </div>
                <small style="color: #999; display: block; margin-top: 15px;">💡 點擊字卡可翻面觀看中文、用法與例句</small>
            </div>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <button id="prev-card" style="padding: 8px 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; border-radius: 5px; cursor: pointer; margin-right: 10px;">⬅️ 上一個</button>
                <button id="next-card" style="padding: 8px 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; border-radius: 5px; cursor: pointer;">下一個 ➡️</button>
            </div>

            <div id="reclassify-zone" style="text-align: center; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; max-width: 400px; margin: 0 auto;">
                <label>🔄 將此字重新分類至：</label>
                <select id="move-folder-select" style="padding: 4px; border-radius: 4px; color: #333;"></select>
                <button id="move-vocab-btn" style="padding: 4px 10px; background: #00E5FF; color: #111; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px;">搬家</button>
            </div>
        </div>
    </section>
    </section>
  </div>

  <script src="app.js?v=999"></script>
</body>
</html>
